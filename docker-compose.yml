services:
  postgres:
    image: postgres:16-alpine
    container_name: operate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: operate
      POSTGRES_PASSWORD: operate
      POSTGRES_DB: operate_control
    ports:
      - "5432:5432"
    volumes:
      - operate-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operate -d operate_control"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: operate-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: operate
      MINIO_ROOT_PASSWORD: operate-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - operate-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev:latest
    container_name: operate-maildev
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1080:1080"
    environment:
      MAILDEV_INCOMING_USER: ""
      MAILDEV_INCOMING_PASS: ""

volumes:
  operate-postgres-data:
  operate-minio-data:
